<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>商城</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui;}
body{background:#f7f8fa;padding-bottom:60px;}
.search{padding:15px;}
.search input{width:100%;height:46px;border-radius:23px;border:1px solid #eee;padding:0 16px;outline:none;}
.banner{height:180px;background:#ff4d4f;margin:0 15px;border-radius:12px;overflow:hidden;}
.banner img{width:100%;height:100%;object-fit:cover;}
.cate{display:flex;gap:10px;padding:15px;overflow-x:auto;}
.cate span{padding:8px 14px;background:#fff;border-radius:20px;white-space:nowrap;cursor:pointer;}
.cate span.active{background:#ff4d4f;color:#fff;}
.goods{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:15px;}
.item{background:#fff;border-radius:12px;overflow:hidden;}
.item img{width:100%;height:160px;object-fit:cover;}
.info{padding:12px;}
.name{font-size:15px;margin-bottom:6px;}
.price{color:#ff4d4f;font-size:16px;font-weight:bold;}
.btn{background:#ff4d4f;color:#fff;border:none;width:100%;padding:8px 0;border-radius:6px;margin-top:4px;}
.nav{position:fixed;bottom:0;left:0;right:0;background:#fff;display:flex;border-top:1px solid #eee;}
.nav span{flex:1;text-align:center;padding:14px 0;cursor:pointer;}
</style>
</head>

<body>
<div class="search">
<input id="searchInput" placeholder="搜索商品" oninput="searchGoods()">
</div>

<div class="banner">
<img src="images/吃堡了.png">
</div>

<div class="cate">
<span class="active" onclick="changeCate('all')">全部</span>
<span onclick="changeCate('新品')">新品</span>
<span onclick="changeCate('热卖')">热卖</span>
<span onclick="changeCate('推荐')">推荐</span>
</div>

<div class="goods" id="list"></div>

<div class="nav">
<span onclick="goHome()">首页</span>
<span onclick="goCart()">购物车</span>
<span onclick="goService()">客服</span>
</div>

<script src="script.js"></script>
<script>
let goods = [
  {id:1,name:"吃堡了",image:"images/吃堡了.png",price:19.9,desc:"吃了就饱了，治愈不开心！",type:"热卖"},
  {id:2,name:"度假",image:"images/度假.png",price:29.9,desc:"想去度假，不想上学",type:"新品"},
  {id:3,name:"好椰",image:"images/好椰.png",price:15.9,desc:"好耶！变成好椰！",type:"推荐"},
  {id:4,name:"胡说",image:"images/胡说.png",price:9.9,desc:"你在胡说什么？",type:"热卖"},
  {id:5,name:"焦虑",image:"images/焦虑.png",price:12.9,desc:"提前焦虑就是在吃屎",type:"新品"},
  {id:6,name:"梨谱",image:"images/梨谱.png",price:8.9,desc:"离离原上谱！",type:"推荐"},
  {id:7,name:"榴芒",image:"images/榴芒.png",price:39.9,desc:"你就是个流氓！",type:"热卖"},
  {id:8,name:"茫然",image:"images/茫然.png",price:16.9,desc:"我现在很茫然…",type:"新品"},
  {id:9,name:"我草，莓招了",image:"images/我草，莓招了.png",price:25.9,desc:"没招了！救救我",type:"推荐"},
  {id:10,name:"面面俱到",image:"images/面面俱到.png",price:22.9,desc:"面条都比你努力",type:"热卖"},
  {id:11,name:"柠好",image:"images/柠好.png",price:11.9,desc:"你好！柠好！",type:"新品"},
  {id:12,name:"射手",image:"images/射手.png",price:18.9,desc:"我是后羿",type:"推荐"},
  {id:13,name:"太南了",image:"images/太南了.png",price:7.9,desc:"太难了！我太南了",type:"热卖"},
  {id:14,name:"我没柿",image:"images/我没柿.png",price:10.9,desc:"没逝，真没柿！",type:"新品"},
  {id:15,name:"要薯了",image:"images/要薯了.png",price:14.9,desc:"薯薯我啊！",type:"推荐"}
];

let currentList = [...goods];

function render(){
  let list = document.getElementById('list');
  list.innerHTML = '';
  currentList.forEach(item=>{
    list.innerHTML += `
    <div class="item" onclick="goDetail(${item.id})">
      <img src="${item.image}">
      <div class="info">
        <div class="name">${item.name}</div>
        <div class="price">¥${item.price}</div>
        <button class="btn" onclick="addCart(${item.id},event)">加入购物车</button>
      </div>
    </div>`;
  });
}

function goDetail(id){
  let item = goods.find(i=>i.id==id);
  localStorage.setItem('detail',JSON.stringify(item));
  location.href='detail.html';
}

function addCart(id,e){
  e.stopPropagation();
  let item = goods.find(i=>i.id==id);
  let cart = JSON.parse(localStorage.getItem('cart')||'[]');
  cart.push(item);
  localStorage.setItem('cart',JSON.stringify(cart));
  alert('已加入购物车');
}

function searchGoods(){
  let key = document.getElementById('searchInput').value.toLowerCase();
  currentList = goods.filter(i=>i.name.toLowerCase().includes(key));
  render();
}

function changeCate(type){
  document.querySelectorAll('.cate span').forEach(s=>s.classList.remove('active'));
  event.target.classList.add('active');
  if(type=='all'){
    currentList=[...goods];
  }else{
    currentList=goods.filter(i=>i.type==type);
  }
  render();
}

render();
</script>
</body>
</html>
