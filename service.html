<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>AI客服</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui;}
body{background:#f7f8fa;}
.chat{height:80vh;overflow-y:auto;padding:20px;}
.msg{max-width:75%;margin-bottom:14px;padding:12px 16px;border-radius:18px;line-height:1.5;}
.user{background:#0099ff;color:#fff;margin-left:auto;}
.ai{background:#fff;color:#333;}
.input-box{position:fixed;bottom:0;left:0;right:0;background:#fff;display:flex;padding:10px;gap:10px;border-top:1px solid #eee;}
input{flex:1;height:46px;border-radius:23px;border:1px solid #ddd;padding:0 16px;outline:none;}
button{padding:0 20px;background:#0099ff;color:#fff;border:none;border-radius:23px;cursor:pointer;}
</style>
</head>

<body>
<div class="chat" id="chat"></div>
<div class="input-box">
<input id="msg" placeholder="请输入问题...">
<button onclick="send()">发送</button>
</div>

<script>
async function send(){
  let msg = document.getElementById('msg').value.trim();
  if(!msg) return;
  let chat = document.getElementById('chat');

  chat.innerHTML += `<div class="msg user">${msg}</div>`;
  document.getElementById('msg').value = '';
  chat.scrollTop = chat.scrollHeight;

  try{
    let res = await fetch('https://api.deepseek.com/chat/completions',{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'Authorization':'Bearer sk-c203e7d3018a40ca87112908019da25a'
      },
      body:JSON.stringify({
        model:'deepseek-chat',
        messages:[{role:'user',content:msg}]
      })
    });
    let data = await res.json();
    let ai = data.choices[0].message.content;
    chat.innerHTML += `<div class="msg ai">${ai}</div>`;
  }catch(e){
    chat.innerHTML += `<div class="msg ai">服务繁忙，请稍后再试</div>`;
  }
  chat.scrollTop = chat.scrollHeight;
}
</script>
</body>
</html>
